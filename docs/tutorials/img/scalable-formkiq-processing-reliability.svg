<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1240" height="660" viewBox="0 0 1240 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FormKiQ processing and reliability architecture">
  <defs>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#b91c1c"/>
    </marker>
    <style>
      .title { font: 700 24px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#0f172a; }
      .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#475569; }
      .boxTitle { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#0f172a; }
      .boxText { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#475569; }
      .label { font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#475569; }
      .box { rx:10; ry:10; filter:url(#shadow); stroke-width:1.3; }
      .blue { fill:#eff6ff; stroke:#2563eb; }
      .green { fill:#ecfdf5; stroke:#059669; }
      .amber { fill:#fffbeb; stroke:#d97706; }
      .red { fill:#fef2f2; stroke:#dc2626; }
      .purple { fill:#f5f3ff; stroke:#7c3aed; }
      .slate { fill:#f8fafc; stroke:#64748b; }
      .line { fill:none; stroke:#475569; stroke-width:1.7; marker-end:url(#arrow); }
      .lineRed { fill:none; stroke:#b91c1c; stroke-width:1.7; marker-end:url(#arrowRed); }
    </style>
  </defs>

  <rect width="1240" height="660" fill="#ffffff"/>
  <text class="title" x="620" y="42" text-anchor="middle">Processing and Reliability Pattern</text>
  <text class="subtitle" x="620" y="66" text-anchor="middle">Use status, retries, queues, DLQs, and logs to make high-volume document processing observable.</text>

  <rect class="box blue" x="70" y="120" width="170" height="70"/>
  <text class="boxTitle" x="155" y="148" text-anchor="middle">Document Created</text>
  <text class="boxText" x="155" y="169" text-anchor="middle">metadata + content</text>

  <rect class="box amber" x="315" y="120" width="170" height="70"/>
  <text class="boxTitle" x="400" y="148" text-anchor="middle">Action Planner</text>
  <text class="boxText" x="400" y="169" text-anchor="middle">rulesets, actions</text>

  <rect class="box amber" x="560" y="120" width="170" height="70"/>
  <text class="boxTitle" x="645" y="148" text-anchor="middle">Work Queue</text>
  <text class="boxText" x="645" y="169" text-anchor="middle">async execution</text>

  <rect class="box green" x="805" y="120" width="170" height="70"/>
  <text class="boxTitle" x="890" y="148" text-anchor="middle">Processor</text>
  <text class="boxText" x="890" y="169" text-anchor="middle">OCR, IDP, webhook</text>

  <rect class="box green" x="1030" y="120" width="150" height="70"/>
  <text class="boxTitle" x="1105" y="148" text-anchor="middle">Result State</text>
  <text class="boxText" x="1105" y="169" text-anchor="middle">tags, attributes</text>

  <path class="line" d="M 240 155 L 315 155"/>
  <path class="line" d="M 485 155 L 560 155"/>
  <path class="line" d="M 730 155 L 805 155"/>
  <path class="line" d="M 975 155 L 1030 155"/>

  <rect class="box slate" x="125" y="295" width="180" height="82"/>
  <text class="boxTitle" x="215" y="325" text-anchor="middle">Action Status</text>
  <text class="boxText" x="215" y="346" text-anchor="middle">GET document actions</text>
  <text class="boxText" x="215" y="364" text-anchor="middle">filter failed work</text>

  <rect class="box slate" x="390" y="295" width="180" height="82"/>
  <text class="boxTitle" x="480" y="325" text-anchor="middle">CloudWatch Logs</text>
  <text class="boxText" x="480" y="346" text-anchor="middle">API, Lambda, workers</text>
  <text class="boxText" x="480" y="364" text-anchor="middle">correlate documentId</text>

  <rect class="box red" x="655" y="295" width="180" height="82"/>
  <text class="boxTitle" x="745" y="325" text-anchor="middle">Dead-Letter Queue</text>
  <text class="boxText" x="745" y="346" text-anchor="middle">unprocessed messages</text>
  <text class="boxText" x="745" y="364" text-anchor="middle">redrive after fix</text>

  <rect class="box slate" x="920" y="295" width="180" height="82"/>
  <text class="boxTitle" x="1010" y="325" text-anchor="middle">Activity Records</text>
  <text class="boxText" x="1010" y="346" text-anchor="middle">who did what</text>
  <text class="boxText" x="1010" y="364" text-anchor="middle">audit and support</text>

  <path class="line" d="M 645 190 C 645 245, 215 245, 215 295"/>
  <path class="line" d="M 890 190 C 890 245, 480 245, 480 295"/>
  <path class="lineRed" d="M 890 190 C 890 245, 745 245, 745 295"/>
  <path class="line" d="M 1105 190 C 1105 245, 1010 245, 1010 295"/>

  <rect x="105" y="460" width="1030" height="96" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="boxTitle" x="620" y="493" text-anchor="middle">Operational Loop</text>
  <text class="boxText" x="620" y="518" text-anchor="middle">Detect failed processing, fix configuration or permissions, retry document actions, redrive DLQ messages, and verify search/activity state.</text>
  <text class="boxText" x="620" y="540" text-anchor="middle">Keep this loop documented before increasing document volume.</text>

  <path class="lineRed" d="M 745 377 C 745 424, 620 424, 620 460"/>

  <text class="label" x="620" y="610" text-anchor="middle">Scale rule: throughput without visibility creates support risk. Add monitoring and replay paths before peak load.</text>
</svg>
